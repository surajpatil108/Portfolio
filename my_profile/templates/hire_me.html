{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Hire Me</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen py-12">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl p-8">
        <a href="{% url 'domains' %}" class="inline-block mb-6 text-indigo-600 hover:text-indigo-800">
            ← Back
        </a>
        
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-300{% else %}bg-red-100 text-red-800 border border-red-300{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Your Name *" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" required>
            
            <input type="email" name="email" placeholder="Your Email *" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" required>
            
            <textarea name="message" rows="5" placeholder="Tell me about your project..." 
                      class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" required></textarea>
            
            <button type="submit" 
                    class="w-full px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">
                Send Message
            </button>
        </form>
    </div>
</body>
</html>
